discord:
  guild_id: '1392562559122407535'
  monitor: all
  exclude_channels:
  - welcome
  lookback_hours: 24

github:
  lookback_hours: 24
  repos:
    - owner: lemonade-sdk
      repo: lemonade
      name: Lemonade
      icon: "\U0001F34B"
      fetch: all
      include_drafts: true
      repo_path: C:/Users/ramkr-halo/actboard/lemonade
      prompt: |
        This is Krishna's own project. PRs where he is a requested
        reviewer or where he requested changes are ACT. High-engagement
        issues are ACT. Low-activity issues are MONITOR. PRs approved/merged
        by others with no action needed are HANDLED.

    - owner: ggerganov
      repo: llama.cpp
      name: llama.cpp
      icon: "\U0001F999"
      fetch: prs_only
      include_drafts: false
      hide_handled: true
      repo_path: C:/Users/ramkr-halo/actboard/llama.cpp
      prompt: |
        Krishna monitors this upstream project for AMD-related work.
        ACT: PRs mentioning AMD, ROCm, HIP, or Radeon. Performance
        improvements to inference, quantization, or memory. New model
        architecture support (e.g. new GGUF format, new model families).
        MONITOR: Other active PRs that could affect Lemonade's llama.cpp integration.
        HANDLED: Merged PRs, clearly unrelated PRs (e.g. iOS-only, Metal-only).

    - owner: ggerganov
      repo: whisper.cpp
      name: whisper.cpp
      icon: "\U0001F399"
      fetch: prs_only
      include_drafts: false
      hide_handled: true
      repo_path: C:/Users/ramkr-halo/actboard/whisper.cpp
      prompt: |
        Krishna monitors this for AMD/ROCm support and speech-to-text
        improvements relevant to Lemonade's multimodal pipeline.
        ACT: PRs mentioning AMD, ROCm, HIP. Performance work on
        inference or decoding. New model support (e.g. large-v3, distil).
        MONITOR: Other notable PRs that could affect Lemonade's whisper integration.
        HANDLED: Merged PRs, clearly unrelated PRs.

outlook:
  folder: "C:/Users/ramkr-halo/Desktop/DailyTriage"
  icon: "\U0001F4E7"
  hide_handled: true
  keywords: []  # empty = send all non-noise emails to LLM
  skip_senders: []  # extra senders to skip beyond defaults
  skip_subjects: []  # extra subjects to skip beyond defaults
  prompt: |
    ACT: Emails requiring Krishna's response or action. Direct requests,
    questions from teammates, review requests, escalations, deadlines.
    MONITOR: FYI emails, status updates, announcements, newsletters
    that Krishna should be aware of but doesn't need to respond to.
    HANDLED: Already read and replied, automated notifications,
    spam-like emails, calendar confirmations.

reddit:
  lookback_hours: 24
  subreddits:
    - name: LocalLLaMA
      icon: "\U0001F999"
      hide_handled: true
      prompt: |
        ACT: Posts mentioning Lemonade, Lemonade SDK, lemonade-sdk,
        AMD Ryzen AI, ROCm for LLMs, or llama.cpp/whisper.cpp performance
        on AMD hardware. Posts asking about local LLM serving on AMD
        that Krishna could help with.
        MONITOR: General local LLM posts about new models, quantization
        techniques, or inference optimization that could be relevant.
        HANDLED: Everything else.
    - name: StrixHalo
      icon: "\U0001F4BB"
      hide_handled: true
      prompt: |
        ACT: Posts mentioning Lemonade, Lemonade SDK, lemonade-sdk,
        ROCm for ML/AI, running LLMs or AI workloads on Strix Halo.
        Posts about llama.cpp or whisper.cpp on Strix Halo/Ryzen AI.
        MONITOR: General Strix Halo performance and ML discussion.
        HANDLED: Unrelated hardware posts, gaming benchmarks.

notion:
